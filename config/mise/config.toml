# Mise configuration for development tools
# This file defines global tool versions

[tools]
# --- Language runtimes (pinned) ---
bun = "1.3.13"
elixir = "1.19.5"
erlang = "28.3.1"
node = "22"
pnpm = "latest"

# --- Dev / infra CLIs (migrated from Homebrew) ---
gh = "latest"
jq = "latest"
yq = "latest"
difftastic = "latest"
gum = "latest"
flyctl = "latest"
hcloud = "latest"
just = "latest"

# --- Other tooling ---
# Bare "dexter" isn't in mise's registry (aborts `mise install` for ALL tools);
# use the explicit aqua backend. Delete this line if you don't need dexter.
"aqua:remoteoss/dexter" = "latest"
sentry-cli = "latest"
sops = "3.13.1"

# Global env vars live in shell/env.sh (single source of truth). Use a per-project
# mise.toml [env] only for project-scoped variables.

[settings]
# Automatically install missing tools
auto_install = true
# Use legacy version files (.node-version, .ruby-version, etc.)
legacy_version_file = true
# Always keep downloads
always_keep_download = false
